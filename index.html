<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ohad Rotem — Calculators</title>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a2028;
    --surface-hover: #232a34;
    --text: #e6e8eb;
    --text-muted: #9aa3ad;
    --accent: #4ea3ff;
    --border: #2a3340;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px;
  }
  header { margin-bottom: 40px; }
  h1 {
    margin: 0 0 8px;
    font-size: 2rem;
    font-weight: 600;
  }
  .subtitle {
    margin: 0;
    color: var(--text-muted);
    font-size: 1rem;
  }
  h2 {
    margin: 40px 0 16px;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .card-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 12px;
  }
  .card {
    display: block;
    padding: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
  }
  .card:hover {
    background: var(--surface-hover);
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .card-title {
    font-weight: 600;
    font-size: 1.05rem;
    margin-bottom: 4px;
  }
  .card-desc {
    color: var(--text-muted);
    font-size: 0.92rem;
  }
  footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Calculators</h1>
    <p class="subtitle">Tools and applications by Ohad Rotem.</p>
  </header>

  <h2>Available</h2>
  <ul class="card-list">
    <li>
      <a class="card" href="https://feedstock-profiler.streamlit.app" target="_blank" rel="noopener">
        <div class="card-title">Chad's Analysis2</div>
      </a>
    </li>
    <li>
      <a class="card" href="Feedstock_Calculator_V2_17.html">
        <div class="card-title">Chad's Analysis3</div>
      </a>
    </li>
    <li>
      <a class="card" href="PRRC_Optimization.html">
        <div class="card-title">Chad's Analysis1</div>
      </a>
    </li>
  </ul>
</div>
</body>
</html>
